[runtime]
app_name = "pumpfun-sniper"
environment = "development"

[logging]
level = "info"

[wallet]
mode = "paper"
keypair_path = "wallet/id.json"

[network.http_rpc]
label = "chainstack-primary"
url = "https://solana-mainnet.core.chainstack.com/5d579f7ee8bdff8bea1ae923df0f6deb"
request_timeout_secs = 10
health_check_interval_secs = 15
blockhash_refresh_interval_secs = 10
heartbeat_interval_secs = 30
commitment = "processed"
max_retries = 3
retry_base_delay_ms = 250
retry_max_delay_ms = 2000

[watcher]
enabled = true
poll_interval_secs = 5
heartbeat_interval_secs = 15
silence_warning_secs = 20

[watcher.websocket]
enabled = true
url = "wss://solana-mainnet.core.chainstack.com/5d579f7ee8bdff8bea1ae923df0f6deb"
commitment = "processed"

[watcher.mayhem]
program_id = "MAyhSmzXzV1pTf7LsNkrNwkWKTo4ougAJ1PPg47MD4e"

