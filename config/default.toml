[runtime]
app_name = "pumpfun-sniper"
environment = "development"

[logging]
level = "info"

[wallet]
mode = "paper"
keypair_path = "wallet/id.json"

[network.http_rpc]
label = "chainstack-primary"
url = "https://solana-mainnet.core.chainstack.com/5d579f7ee8bdff8bea1ae923df0f6deb"
request_timeout_secs = 10
health_check_interval_secs = 15
blockhash_refresh_interval_secs = 10
heartbeat_interval_secs = 30
commitment = "processed"
max_retries = 3
retry_base_delay_ms = 250
retry_max_delay_ms = 2000